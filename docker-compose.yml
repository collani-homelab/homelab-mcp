services:
  homelab-mcp:
    image: 192.168.99.178:5000/homelab-mcp:latest
    container_name: homelab-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MCP_TRANSPORT=sse
      - PROMETHEUS_URL=http://192.168.99.178:9091
      - LOKI_URL=http://192.168.99.178:3100
    env_file:
      - .env
