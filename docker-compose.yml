services:
  homelab-mcp:
    image: ${IMAGE_TAG:-homelab-mcp:latest}
    container_name: homelab-mcp
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - MCP_TRANSPORT=sse
      - PROMETHEUS_URL=${PROMETHEUS_URL:-}
      - LOKI_URL=${LOKI_URL:-}
      - HOMELAB_CONTEXT_URL=${HOMELAB_CONTEXT_URL:-}
      - DEPLOY_WEBHOOK_URL=${DEPLOY_WEBHOOK_URL:-}
      - NTFY_URL=${NTFY_URL:-}
      - GH_TOKEN
    env_file:
      - .env
