name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, sre]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Image
        env:
          IMAGE_TAG: "192.168.99.178:5000/homelab-mcp:latest"
        run: |
          mise run docker-build
          mise run docker-push

      - name: Deploy Service
        run: |
          cd ~/repos/homelab-platform
          git pull
          mise run build
          ./homelab-deploy -deploy homelab-mcp -repo .
