name: PR Review

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: review
    runs-on: [self-hosted, sre]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Code Review
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --skip-permissions -p "/code-review --comment"

      - name: Security Review
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --skip-permissions -p "/security-review --comment"

      - name: Notify
        if: always()
        env:
          PR_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          curl -s \
            -H "Title: PR ready: $PR_REPO #$PR_NUM" \
            -H "Tags: github,pr" \
            -d "$PR_AUTHOR opened #$PR_NUM: $PR_TITLE
$PR_URL" \
            http://localhost:9099/homelab_alerts
