name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: review
    runs-on: [self-hosted, sre]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: |
          if ! command -v claude &>/dev/null; then
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Code Review
        continue-on-error: true
        run: |
          claude --dangerously-skip-permissions -p "/code-review --comment"

      - name: Security Review
        continue-on-error: true
        run: |
          claude --dangerously-skip-permissions -p "/security-review --comment"

      - name: Notify
        if: always()
        env:
          PR_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          curl -s \
            -H "Title: PR ready: $PR_REPO #$PR_NUM" \
            -H "Tags: github,pr" \
            -d "$PR_AUTHOR $PR_ACTION #$PR_NUM: $PR_TITLE $PR_URL" \
            http://localhost:9099/homelab_alerts
